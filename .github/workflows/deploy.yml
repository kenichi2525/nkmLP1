name: Deploy to Lolipop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.LOLIPOP_FTP_SERVER }}
          username: ${{ secrets.LOLIPOP_FTP_USERNAME }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          server-dir: /top/lp/
          local-dir: ./
          secure: false
